# Render Blueprint — deploys the Django API as a free web service.
# In the Render dashboard: New + → Blueprint → point at this repo.
services:
  - type: web
    name: mmtjobs-api
    runtime: python
    plan: free
    region: singapore  # same region as the Neon DB — cuts query latency ~10x
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && (python manage.py createsuperuser --noinput || true) && python manage.py migrate_collections
    startCommand: gunicorn mmtjobs_api.wsgi:application --workers 2 --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      # Deployed frontend origins (CORS allow-list), comma-separated
      - key: FRONTEND_ORIGINS
        value: "https://www.mmtijobs.com,https://mmtijobs.com,https://mmtijobs.vercel.app"
      # Paste a persistent Postgres URL (free: https://neon.tech) in the
      # dashboard. Without it the API falls back to SQLite on Render's
      # ephemeral disk and data resets on every deploy.
      - key: DATABASE_URL
        sync: false
      # Django admin account, auto-created on deploy (change anytime in
      # the dashboard; the password is only used if the user doesn't exist yet).
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      # Brevo SMTP credentials (Brevo dashboard → SMTP & API → SMTP).
      # Leave blank to disable outbound mail (emails then only log to console).
      - key: BREVO_SMTP_LOGIN
        sync: false
      - key: BREVO_SMTP_KEY
        sync: false
      # Sender address — must be verified in the Brevo account.
      - key: DEFAULT_FROM_EMAIL
        sync: false
      # v2 API staff logins (hashed server-side). One password for all four
      # role accounts (admin / hr / hr_manager / hr_recruiter); leave blank
      # to skip creating them.
      - key: STAFF_SHARED_PASSWORD
        sync: false
