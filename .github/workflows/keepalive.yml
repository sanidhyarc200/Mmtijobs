# Pings the API every 10 minutes so Render's free instance (and the Neon
# database) never go to sleep — eliminates the ~50s cold-start users see.
name: Keep API warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping warm endpoint
        run: curl -sf --max-time 90 https://mmtjobs-api.onrender.com/api/warm/ || true
